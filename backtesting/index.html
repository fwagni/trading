<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT Backtesting Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;
  --bg2:#10151f;
  --s1:#141c2e;
  --s2:#1a2338;
  --s3:#1f2840;
  --border:rgba(255,255,255,0.055);
  --border2:rgba(255,255,255,0.1);
  --text:#d8dff0;
  --sub:#8592a8;
  --hint:#3d4d66;
  --accent:#4f7ef0;
  --accent2:#7fa4ff;
  --green:#4ecb71;
  --green2:rgba(78,203,113,0.14);
  --red:#e05c5c;
  --red2:rgba(224,92,92,0.14);
  --amber:#e0a830;
  --amber2:rgba(224,168,48,0.14);
  --blue2:rgba(79,126,240,0.13);
  --purple:#a78bfa;
  --r:12px;
  --r2:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.55;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ── HEADER ─────────────────────────────────────── */
#hdr{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:.75rem 1.75rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;backdrop-filter:blur(16px);
}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-logo{
  width:34px;height:34px;
  background:linear-gradient(135deg,#4f7ef0 0%,#8b5cf6 100%);
  border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.hdr-title{font-size:14.5px;font-weight:600;letter-spacing:-.02em;line-height:1.2}
.hdr-sub{font-size:11px;color:var(--sub);margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:10px}
#last-upd{font-size:11px;color:var(--sub);background:var(--s1);border:1px solid var(--border);padding:4px 12px;border-radius:99px;white-space:nowrap;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 7px var(--green);animation:pulse 2.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── FILTER BAR ─────────────────────────────────── */
#fbar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:.55rem 1.75rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  position:sticky;top:57px;z-index:199;
}
.fg{display:flex;align-items:center;gap:6px}
.fl{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.fsel,.fdate{
  font-size:12px;padding:5px 9px;height:29px;
  border:1px solid var(--border2);border-radius:var(--r2);
  background:var(--s1);color:var(--text);cursor:pointer;outline:none;
  font-family:inherit;transition:border-color .12s,box-shadow .12s;
}
.fsel:hover,.fdate:hover{border-color:var(--accent)}
.fsel:focus,.fdate:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--blue2)}
.fdate{width:128px;color-scheme:dark}
.fsep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.presets{display:flex;gap:3px}
.pb{
  font-size:11px;font-weight:500;padding:3px 9px;height:27px;
  border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--sub);cursor:pointer;
  font-family:inherit;transition:all .12s;white-space:nowrap;
}
.pb:hover{background:var(--s3);color:var(--text);border-color:var(--accent)}
.pb.on{background:var(--blue2);color:var(--accent2);border-color:var(--accent)}
.pill-bar{display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:.35rem 1.75rem;background:var(--bg);border-bottom:1px solid var(--border)}
.pill-bar:empty{display:none;padding:0;border:none}
.pill{display:flex;align-items:center;gap:4px;font-size:11px;background:var(--blue2);color:var(--accent2);border:1px solid rgba(79,126,240,.2);border-radius:99px;padding:2px 9px 2px 8px;cursor:pointer}
.pill:hover{background:rgba(79,126,240,.22)}
.pc{color:var(--sub);font-size:11px}

/* ── LAYOUT ─────────────────────────────────────── */
main{max-width:1140px;margin:0 auto;padding:1.5rem 1.5rem 5rem}
.row{display:grid;gap:14px;margin-bottom:14px}
.row.c2{grid-template-columns:1fr 1fr}
.row.c3{grid-template-columns:1fr 1fr 1fr}
.row.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.row.c32{grid-template-columns:1.6fr 1fr}
.row.c23{grid-template-columns:1fr 1.6fr}
.mb{margin-bottom:14px}

/* ── SECTION LABEL ──────────────────────────────── */
.slbl{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--hint);
  margin-bottom:.6rem;display:flex;align-items:center;gap:8px;
}
.slbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── CARD ───────────────────────────────────────── */
.card{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:1.15rem;
  transition:border-color .15s;position:relative;overflow:hidden;
}
.card:hover{border-color:var(--border2)}
.ct{font-size:12.5px;font-weight:600;margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between;color:var(--text)}
.ct-sub{font-size:11px;font-weight:400;color:var(--sub);margin-left:6px}
.csub{font-size:10.5px;color:var(--hint);margin-top:7px;line-height:1.5}

/* ── KPI CARDS ──────────────────────────────────── */
.kpi{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  padding:1.1rem 1.15rem;position:relative;overflow:hidden;
  transition:border-color .15s,transform .15s;
}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px)}
.kpi-stripe{position:absolute;top:0;left:0;right:0;height:2px}
.kpi-ico{font-size:18px;margin-bottom:7px;line-height:1}
.kpi-lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.kpi-val{font-size:30px;font-weight:700;line-height:1;letter-spacing:-.03em}
.kpi-val.g{color:var(--green)}.kpi-val.r{color:var(--red)}.kpi-val.a{color:var(--amber)}.kpi-val.b{color:var(--accent2)}.kpi-val.p{color:var(--purple)}
.kpi-hint{font-size:10.5px;color:var(--hint);margin-top:5px}
.kbar{height:3px;background:var(--s3);border-radius:99px;margin-top:8px;overflow:hidden}
.kbar-f{height:100%;border-radius:99px;transition:width .5s ease}

/* ── CHART WRAP ─────────────────────────────────── */
.cw{position:relative;width:100%}

/* ── LEGEND ─────────────────────────────────────── */
.leg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px;font-size:11px;color:var(--sub)}
.li{display:flex;align-items:center;gap:3px;white-space:nowrap}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── HEATMAP ────────────────────────────────────── */
.hm-wrap{overflow-x:auto}
.hmt{border-collapse:separate;border-spacing:3px;width:100%;font-size:11.5px}
.hmt th{font-size:10px;font-weight:600;color:var(--sub);text-align:center;padding:5px 8px;text-transform:uppercase;letter-spacing:.05em}
.hmt .rh{text-align:left;white-space:nowrap;font-weight:400;color:var(--sub);padding-right:14px;font-size:11px}
.hmt td{padding:7px 10px;text-align:center;font-weight:700;font-size:12px;border-radius:6px;transition:transform .1s;cursor:default}
.hmt td:not(.rh):hover{transform:scale(1.08)}
.ca{background:rgba(78,203,113,.2);color:#6ddb8e}
.cb{background:rgba(224,168,48,.18);color:#f0c060}
.cc{background:rgba(224,92,92,.17);color:#f08080}
.cn{background:var(--s3);color:var(--hint);font-weight:400;font-size:11px}

/* ── DATA TABLE ─────────────────────────────────── */
.dtbl{width:100%;border-collapse:collapse;font-size:12px}
.dtbl th{
  font-size:10px;font-weight:700;color:var(--sub);text-align:left;
  padding:7px 12px;border-bottom:1px solid var(--border);
  text-transform:uppercase;letter-spacing:.06em;cursor:pointer;user-select:none;white-space:nowrap;
}
.dtbl th:hover{color:var(--text)}
.dtbl td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.dtbl tr:last-child td{border-bottom:none}
.dtbl tbody tr:hover td{background:var(--s2)}
.sa{margin-left:3px;opacity:.3;font-size:9px}
.sa.on{opacity:1;color:var(--accent2)}

/* ── BADGES / PILLS ─────────────────────────────── */
.bdg{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.04em}
.ba{background:var(--green2);color:var(--green)}.bb{background:var(--amber2);color:var(--amber)}.bc{background:var(--red2);color:var(--red)}.bn{background:rgba(100,116,139,.12);color:var(--sub)}
.tag{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px}
.tg{background:var(--green2);color:var(--green)}.tr{background:var(--red2);color:var(--red)}.ta{background:var(--amber2);color:var(--amber)}.tb{background:var(--blue2);color:var(--accent2)}.tn{background:rgba(100,116,139,.1);color:var(--sub)}

/* ── PROGRESS RING ──────────────────────────────── */
.ring-wrap{display:flex;align-items:center;justify-content:center;padding:.5rem 0}
.ring-svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--s3);stroke-width:8}
.ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.ring-label{position:absolute;text-align:center;line-height:1.2}
.ring-val{font-size:22px;font-weight:700;letter-spacing:-.02em}
.ring-lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

/* ── DIRECTION BAR ──────────────────────────────── */
.dbar{height:8px;border-radius:99px;overflow:hidden;background:var(--s3);display:flex;margin:6px 0}
.dbar-l{background:var(--green);transition:width .5s ease}
.dbar-r{background:var(--red);transition:width .5s ease}
.dbar-legend{display:flex;justify-content:space-between;font-size:10.5px}

/* ── MISC ───────────────────────────────────────── */
.nodata{text-align:center;padding:2.5rem;color:var(--hint);font-size:12px}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:65vh;gap:14px}
.spin{width:32px;height:32px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.errbox{background:var(--red2);color:var(--red);border:1px solid rgba(224,92,92,.2);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1rem;font-size:13px}
.divider{height:1px;background:var(--border);margin:1.25rem 0}

@media(max-width:900px){.row.c3,.row.c4{grid-template-columns:1fr 1fr}.row.c32,.row.c23{grid-template-columns:1fr}}
@media(max-width:600px){main{padding:1rem}#hdr,#fbar{padding-left:1rem;padding-right:1rem}.row.c2,.row.c3,.row.c4{grid-template-columns:1fr}#fbar{flex-direction:column;align-items:flex-start}.fdate{width:115px}}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="hdr-l">
    <div class="hdr-logo">📈</div>
    <div>
      <div class="hdr-title">ICT Backtesting Dashboard</div>
      <div class="hdr-sub">Opportunity research &middot; session interactions &middot; fwagni</div>
    </div>
  </div>
  <div class="hdr-r">
    <div id="last-upd"><span class="dot"></span>Loading&hellip;</div>
  </div>
</div>

<!-- FILTER BAR -->
<div id="fbar">
  <div class="fg">
    <span class="fl">Period</span>
    <div class="presets">
      <button class="pb" data-p="7d"  onclick="setPre('7d')">7D</button>
      <button class="pb" data-p="1m"  onclick="setPre('1m')">1M</button>
      <button class="pb" data-p="3m"  onclick="setPre('3m')">3M</button>
      <button class="pb" data-p="6m"  onclick="setPre('6m')">6M</button>
      <button class="pb" data-p="ytd" onclick="setPre('ytd')">YTD</button>
      <button class="pb on" data-p="all" onclick="setPre('all')">All</button>
    </div>
  </div>
  <div class="fsep"></div>
  <div class="fg">
    <span class="fl">From</span>
    <input type="date" id="f-s" class="fdate" onchange="onCD()">
    <span class="fl">To</span>
    <input type="date" id="f-e" class="fdate" onchange="onCD()">
  </div>
  <div class="fsep"></div>
  <div class="fg">
    <select id="f-i"  class="fsel" onchange="render()"><option value="">All instruments</option></select>
    <select id="f-kz" class="fsel" onchange="render()">
      <option value="">All kill zones</option>
      <option>London Open</option><option>NY AM</option><option>NY Lunch</option><option>NY PM</option>
    </select>
    <select id="f-n" class="fsel" onchange="render()">
      <option value="">News: all</option>
      <option value="none">No news</option>
      <option value="red">Red news</option>
      <option value="any">Any news</option>
    </select>
    <select id="f-d" class="fsel" onchange="render()">
      <option value="">All days</option>
      <option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option>
    </select>
    <select id="f-htf" class="fsel" onchange="render()">
      <option value="">HTF: all</option>
      <option value="yes">HTF aligned</option>
      <option value="no">Not aligned</option>
    </select>
  </div>
</div>

<div class="pill-bar" id="pills"></div>

<main id="app">
  <div class="loading-wrap"><div class="spin"></div><div style="color:var(--sub);font-size:13px">Loading backtest_log.csv&hellip;</div></div>
</main>

<script>
const CSV='./backtest_log.csv';
const PATS=['Asia Low + London Low Swept','Asia High + London High Swept','Both Sessions Swept Low','Both Sessions Swept High','London Low Only','London High Only','Asia Low Swept Only','Asia High Swept Only','No Sweeps'];
const KZS=['London Open','NY AM','NY Lunch','NY PM'];
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday'];
const PAL=['#4ecb71','#e05c5c','#e0a830','#4f7ef0','#a78bfa','#38bdf8','#f472b6','#fb923c','#64748b','#2dd4bf'];
const GC='rgba(255,255,255,0.035)';
const TF={size:11,family:"-apple-system,'Inter',sans-serif",color:'#8592a8'};
const TT={backgroundColor:'#141c2e',titleColor:'#d8dff0',bodyColor:'#8592a8',borderColor:'rgba(255,255,255,.07)',borderWidth:1,padding:10,cornerRadius:6};
const CDEFS={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},animation:{duration:350}};

let ALL=[],charts={},sCol='freq',sDir=-1,_clears=[];

function dc(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function pct(n,d){return d?Math.round(n/d*100):0;}
function avg(a){return a.length?+(a.reduce((s,v)=>s+v,0)/a.length).toFixed(2):null;}
function today(){return new Date().toISOString().slice(0,10);}
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}

/* ── PRESETS ───────────────────────── */
function setPre(p){
  document.querySelectorAll('.pb').forEach(b=>b.classList.toggle('on',b.dataset.p===p));
  const now=today();
  const m={'7d':addDays(now,-7),'1m':addDays(now,-30),'3m':addDays(now,-90),'6m':addDays(now,-180)};
  if(p==='all'){document.getElementById('f-s').value='';document.getElementById('f-e').value='';}
  else if(p==='ytd'){document.getElementById('f-s').value=new Date().getFullYear()+'-01-01';document.getElementById('f-e').value=now;}
  else{document.getElementById('f-s').value=m[p];document.getElementById('f-e').value=now;}
  render();
}
function onCD(){document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));render();}

/* ── FILTERS ───────────────────────── */
function filtered(){
  const s=document.getElementById('f-s').value,e=document.getElementById('f-e').value;
  const fi=document.getElementById('f-i').value,fk=document.getElementById('f-kz').value;
  const fn=document.getElementById('f-n').value,fd=document.getElementById('f-d').value;
  const fh=document.getElementById('f-htf').value;
  return ALL.filter(r=>{
    const d=r['Session Date']||'';
    if(s&&d<s)return false;if(e&&d>e)return false;
    if(fi&&r.Instrument!==fi)return false;
    if(fk&&r['Kill Zone']!==fk)return false;
    if(fn==='none'&&r['News Day']!=='None')return false;
    if(fn==='red'&&!['Red News','Red + Orange'].includes(r['News Day']))return false;
    if(fn==='any'&&r['News Day']==='None')return false;
    if(fd&&r['Day of Week']!==fd)return false;
    if(fh==='yes'&&r['HTF Bias Aligned']!=='Yes')return false;
    if(fh==='no'&&r['HTF Bias Aligned']==='Yes')return false;
    return true;
  });
}

function updatePills(){
  const s=document.getElementById('f-s').value,e=document.getElementById('f-e').value;
  const fi=document.getElementById('f-i').value,fk=document.getElementById('f-kz').value;
  const fn=document.getElementById('f-n').value,fd=document.getElementById('f-d').value;
  const fh=document.getElementById('f-htf').value;
  const pills=[];
  if(s||e)pills.push({l:(s||'…')+' → '+(e||'…'),c:()=>{document.getElementById('f-s').value='';document.getElementById('f-e').value='';setPre('all');}});
  if(fi)pills.push({l:fi,c:()=>{document.getElementById('f-i').value='';render();}});
  if(fk)pills.push({l:fk,c:()=>{document.getElementById('f-kz').value='';render();}});
  if(fn)pills.push({l:{none:'No news',red:'Red news',any:'Any news'}[fn],c:()=>{document.getElementById('f-n').value='';render();}});
  if(fd)pills.push({l:fd,c:()=>{document.getElementById('f-d').value='';render();}});
  if(fh)pills.push({l:fh==='yes'?'HTF aligned':'HTF not aligned',c:()=>{document.getElementById('f-htf').value='';render();}});
  _clears=pills.map(p=>p.c);
  const bar=document.getElementById('pills');
  bar.innerHTML=pills.length
    ?`<span class="pc">${pills.length} filter${pills.length>1?'s':''} active</span>`
     +pills.map((p,i)=>`<span class="pill" onclick="_clears[${i}]()">${p.l} <span style="opacity:.5">×</span></span>`).join('')
    :'';
}

/* ── CORE STATS ────────────────────── */
function stats(rows){
  const withSetup=rows.filter(r=>r['Setup Appeared']==='Yes');
  const freqPct=pct(withSetup.length,rows.length);
  const rrs=withSetup.filter(r=>parseFloat(r['Potential RR'])>0).map(r=>parseFloat(r['Potential RR']));
  const quals=withSetup.filter(r=>parseFloat(r['Setup Quality (1-5)'])>0).map(r=>parseFloat(r['Setup Quality (1-5)']));
  const longs=withSetup.filter(r=>r['Setup Direction']==='Long').length;
  const shorts=withSetup.filter(r=>r['Setup Direction']==='Short').length;
  return{
    total:rows.length,
    withSetup:withSetup.length,
    freqPct,
    avgRR:avg(rrs),
    avgQual:avg(quals),
    longPct:pct(longs,withSetup.length),
    shortPct:pct(shorts,withSetup.length),
    longs,shorts,
  };
}

/* ── RENDER ────────────────────────── */
function render(){
  updatePills();
  const data=filtered();
  // repopulate instrument select
  const iSel=document.getElementById('f-i'),ci=iSel.value;
  const insts=[...new Set(ALL.map(r=>r.Instrument).filter(Boolean))].sort();
  iSel.innerHTML='<option value="">All instruments</option>'+insts.map(i=>`<option${ci===i?' selected':''}>${i}</option>`).join('');

  const S=stats(data);
  const withSetup=data.filter(r=>r['Setup Appeared']==='Yes');

  document.getElementById('app').innerHTML=buildLayout(S);

  buildKPIRing('ring-freq',S.freqPct,'#4f7ef0');
  buildKPIRing('ring-qual',S.avgQual?Math.round(S.avgQual/5*100):0,S.avgQual>=4?'#4ecb71':S.avgQual>=3?'#e0a830':'#e05c5c',true,S.avgQual,'/5');
  buildDirectionBar(S);
  buildFreqByPatternChart(data);
  buildAvgRRChart(withSetup);
  buildKZHeatmap(data);
  buildDayChart(data);
  buildNewsChart(data);
  buildHTFChart(data);
  buildEntryTypeChart(withSetup);
  buildPatternTable(data);
}

function buildLayout(S){
  const freqClr=S.freqPct>=60?'var(--green)':S.freqPct>=40?'var(--amber)':'var(--red)';
  const rrClr=S.avgRR>=3?'var(--green)':S.avgRR>=2?'var(--amber)':'var(--red)';
  const qClr=S.avgQual>=4?'var(--green)':S.avgQual>=3?'var(--amber)':'var(--red)';
  return`
<!-- ① KPIs -->
<div class="row c4 mb">
  <div class="kpi"><div class="kpi-stripe" style="background:var(--accent)"></div>
    <div class="kpi-ico">📅</div><div class="kpi-lbl">Sessions studied</div>

/* ── RING CHART ─────────────────────── */
function buildKPIRing(id,pct,color,isRaw=false,raw=null,suffix=''){
  const svg=document.getElementById(id);if(!svg)return;
  const r=56,cx=70,cy=70,circ=2*Math.PI*r;
  const offset=circ-(pct/100)*circ;
  svg.innerHTML=`<circle class="ring-bg" cx="${cx}" cy="${cy}" r="${r}"/>
  <circle class="ring-fg" cx="${cx}" cy="${cy}" r="${r}" stroke="${color}"
    stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>`;
  const valEl=document.getElementById('rv-'+id.replace('ring-',''));
  if(valEl){valEl.style.color=color;valEl.textContent=isRaw&&raw!=null?raw+suffix:pct+'%';}
}

/* ── FREQ BY PATTERN ────────────────── */
function buildFreqByPatternChart(data){
  const rows=PATS.map(p=>{
    const total=data.filter(r=>r['Pattern Tag']===p||r['Pattern Tag']?.includes(p));
    const totalAll=data.filter(r=>r['Pattern Tag']===p);
    if(!totalAll.length)return null;
    const withS=totalAll.filter(r=>r['Setup Appeared']==='Yes');
    return{p,freq:pct(withS.length,totalAll.length),n:totalAll.length};
  }).filter(Boolean);
  const labels=rows.map(r=>r.p);
  const vals=rows.map(r=>r.freq);
  const clrs=rows.map(r=>r.freq>=60?'#4ecb71bb':r.freq>=40?'#e0a830bb':'#e05c5cbb');
  const brd=rows.map(r=>r.freq>=60?'#4ecb71':r.freq>=40?'#e0a830':'#e05c5c');
  document.getElementById('leg-p').innerHTML=labels.map((l,i)=>
    `<span class="li"><span class="ld" style="background:${brd[i]}"></span>${l.length>26?l.slice(0,24)+'…':l} <strong style="color:var(--text);margin-left:2px">${vals[i]}%</strong></span>`
  ).join('');
  dc('p');
  charts['p']=new Chart(document.getElementById('c-p'),{
    type:'bar',
    data:{labels,datasets:[{data:vals,backgroundColor:clrs,borderColor:brd,borderWidth:1,borderRadius:5,borderSkipped:false}]},
    options:{...CDEFS,indexAxis:'y',scales:{
      x:{min:0,max:100,ticks:{callback:v=>v+'%',...TF},grid:{color:GC}},
      y:{ticks:{...TF,font:{size:10}},grid:{color:'transparent'}}
    },plugins:{...CDEFS.plugins,tooltip:{callbacks:{label:c=>` ${c.parsed.x}% setup frequency`},...TT}}}
  });
}

/* ── KZ HEATMAP ─────────────────────── */
function buildKZHeatmap(data){
  const pats=PATS.filter(p=>data.some(r=>r['Pattern Tag']===p));
  const kzs=KZS.filter(k=>data.some(r=>r['Kill Zone']===k));
  if(!pats.length||!kzs.length){document.getElementById('hm').innerHTML='<div class="nodata">Not enough data — add more sessions.</div>';return;}
  function cls(f,n){if(n<3)return'cn';if(f>=60)return'ca';if(f>=40)return'cb';return'cc';}
  let h=`<table class="hmt"><thead><tr><th></th>${kzs.map(k=>`<th>${k}</th>`).join('')}</tr></thead><tbody>`;
  pats.forEach(p=>{
    h+=`<tr><td class="rh">${p}</td>`;
    kzs.forEach(k=>{
      const g=data.filter(r=>r['Pattern Tag']===p&&r['Kill Zone']===k);
      const ws=g.filter(r=>r['Setup Appeared']==='Yes');
      const f=pct(ws.length,g.length);
      h+=`<td class="${cls(f,g.length)}" title="${g.length} obs · ${ws.length} setups">${g.length<3?'&lt;3':f+'%'}</td>`;
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('hm').innerHTML=h;
}

/* ── PATTERN TABLE ──────────────────── */
function buildPatternTable(data){
  const rows=PATS.map((p,i)=>{
    const g=data.filter(r=>r['Pattern Tag']===p);
    if(!g.length)return null;
    const ws=g.filter(r=>r['Setup Appeared']==='Yes');
    const freq=pct(ws.length,g.length);
    const rrs=ws.filter(r=>parseFloat(r['Potential RR'])>0).map(r=>parseFloat(r['Potential RR']));
    const quals=ws.filter(r=>parseFloat(r['Setup Quality (1-5)'])>0).map(r=>parseFloat(r['Setup Quality (1-5)']));
    const avgRR=avg(rrs),avgQ=avg(quals);
    const longs=ws.filter(r=>r['Setup Direction']==='Long').length;
    const shorts=ws.filter(r=>r['Setup Direction']==='Short').length;
    const dominantDir=longs>shorts?'Long':shorts>longs?'Short':'Mixed';
    const types=[...ws.reduce((m,r)=>{if(r['Entry Type'])m.set(r['Entry Type'],(m.get(r['Entry Type'])||0)+1);return m;},new Map())].sort((a,b)=>b[1]-a[1]);
    const topType=types[0]?types[0][0]:'—';
    const nyReact=[...ws.reduce((m,r)=>{if(r['NY AM Reaction'])m.set(r['NY AM Reaction'],(m.get(r['NY AM Reaction'])||0)+1);return m;},new Map())].sort((a,b)=>b[1]-a[1]);
    const dominantNY=nyReact[0]?nyReact[0][0]:'—';
    const grade=freq>=60&&(avgRR??0)>=3&&g.length>=10?'A':freq>=45&&(avgRR??0)>=2&&g.length>=5?'B':g.length>=3?'C':'N';
    return{p,n:g.length,ws:ws.length,freq,avgRR,avgQ,dominantDir,topType,dominantNY,grade,longs,shorts,i};
  }).filter(Boolean);

  [...new Set(data.map(r=>r['Pattern Tag']))].forEach((p,i)=>{
    if(!PATS.includes(p)&&p){
      const g=data.filter(r=>r['Pattern Tag']===p);
      const ws=g.filter(r=>r['Setup Appeared']==='Yes');
      const freq=pct(ws.length,g.length);
      const rrs=ws.filter(r=>parseFloat(r['Potential RR'])>0).map(r=>parseFloat(r['Potential RR']));
      const quals=ws.filter(r=>parseFloat(r['Setup Quality (1-5)'])>0).map(r=>parseFloat(r['Setup Quality (1-5)']));
      rows.push({p,n:g.length,ws:ws.length,freq,avgRR:avg(rrs),avgQ:avg(quals),dominantDir:'—',topType:'—',dominantNY:'—',grade:'N',longs:0,shorts:0});
    }
  });

  rows.sort((a,b)=>{
    let av=a[sCol]??-999,bv=b[sCol]??-999;
    if(typeof av==='string')return av.localeCompare(bv)*sDir;
    return(bv-av)*sDir;
  });

  if(!rows.length){document.getElementById('ptbl').innerHTML='<div class="nodata">No data yet. Add sessions to the CSV.</div>';return;}
  const bc=g=>({A:'ba',B:'bb',C:'bc',N:'bn'}[g]);
  const ar=c=>`<span class="sa${sCol===c?' on':''}">${sCol===c&&sDir===1?'↑':'↓'}</span>`;
  const dirTag=d=>d==='Long'?`<span class="tag tg">↑ Long</span>`:d==='Short'?`<span class="tag tr">↓ Short</span>`:`<span class="tag tn">${d}</span>`;
  const nyTag=n=>n==='Reversal'?`<span class="tag tg">Reversal</span>`:n==='Continuation'?`<span class="tag tb">Continuation</span>`:n==='Chop'?`<span class="tag tn">Chop</span>`:`<span class="tag tn">${n}</span>`;

  document.getElementById('ptbl').innerHTML=`
  <table class="dtbl">
    <thead><tr>
      <th onclick="sortT('p')">Pattern ${ar('p')}</th>
      <th onclick="sortT('n')">Days ${ar('n')}</th>
      <th onclick="sortT('freq')">Freq ${ar('freq')}</th>
      <th onclick="sortT('avgRR')">Avg R:R ${ar('avgRR')}</th>
      <th onclick="sortT('avgQ')">Avg quality ${ar('avgQ')}</th>
      <th onclick="sortT('dominantDir')">Direction ${ar('dominantDir')}</th>
      <th>Top entry</th>
      <th>NY reaction</th>
      <th onclick="sortT('grade')">Grade ${ar('grade')}</th>
    </tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td style="font-weight:500;max-width:220px">${r.p}</td>
      <td>${r.n}<span style="color:var(--hint);font-size:10px"> (${r.ws} setup${r.ws!==1?'s':''})</span></td>
      <td><span style="font-weight:700;color:${r.freq>=60?'var(--green)':r.freq>=40?'var(--amber)':'var(--red)'}">${r.freq}%</span></td>
      <td style="font-weight:600;color:${r.avgRR>=3?'var(--green)':r.avgRR>=2?'var(--amber)':'var(--sub)'}">${r.avgRR!=null?r.avgRR+'R':'—'}</td>
      <td style="font-weight:600;color:${r.avgQ>=4?'var(--green)':r.avgQ>=3?'var(--amber)':'var(--sub)'}">${r.avgQ!=null?r.avgQ+'/5':'—'}</td>
      <td>${dirTag(r.dominantDir)}</td>
      <td><span class="tag tb">${r.topType}</span></td>
      <td>${nyTag(r.dominantNY)}</td>
      <td><span class="bdg ${bc(r.grade)}">${r.grade}</span></td>
    </tr>`).join('')}
    </tbody>
  </table>
  <div class="csub" style="margin-top:10px">Grade A = freq ≥60% + avg R:R ≥3R + ≥10 obs &nbsp;·&nbsp; B = freq ≥45% + R:R ≥2R + ≥5 obs &nbsp;·&nbsp; C = enough data, not yet A/B &nbsp;·&nbsp; N = insufficient data</div>`;
}

function sortT(c){if(sCol===c)sDir*=-1;else{sCol=c;sDir=-1;}buildPatternTable(filtered());}

Papa.parse(CSV,{

    document.getElementById('last-upd').innerHTML=`<span class="dot"></span>${ALL.length} sessions &middot; ${dates[0]||'—'} → ${dates[dates.length-1]||'—'}`;
    render();
  },
  error(err){document.getElementById('app').innerHTML=`<div class="errbox">Could not load backtest_log.csv: ${err.message||err}</div>`;}
});
