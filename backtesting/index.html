<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT Backtesting Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1117;--bg2:#141824;--surface:#1a2035;--surface2:#202640;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#dde2ee;--muted:#7a88a0;--hint:#3d4a60;
  --accent:#4f7ef0;--accent2:#7fa4f8;
  --green:#52c469;--green-dim:rgba(82,196,105,.13);
  --red:#e05656;--red-dim:rgba(224,86,86,.13);
  --amber:#e0a030;--amber-dim:rgba(224,160,48,.13);
  --blue-dim:rgba(79,126,240,.13);
  --radius:12px;--radius-sm:8px;
  --shadow:0 4px 20px rgba(0,0,0,.4);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13.5px;line-height:1.55;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* HEADER */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:.8rem 1.75rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,#4f7ef0,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
header h1{font-size:15px;font-weight:600;letter-spacing:-.02em}
header .sub{font-size:11px;color:var(--muted);margin-top:1px}
#last-updated{font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:4px 12px;border-radius:99px;white-space:nowrap}
.dot{width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;margin-right:5px;box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* FILTER BAR */
#filter-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:.6rem 1.75rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:57px;z-index:99}
.fg{display:flex;align-items:center;gap:7px}
.flabel{font-size:10.5px;color:var(--hint);font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.fsel,.fdate{font-size:12px;padding:5px 9px;height:30px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);cursor:pointer;outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.fsel:hover,.fdate:hover{border-color:var(--accent)}
.fsel:focus,.fdate:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--blue-dim)}
.fdate{width:132px;color-scheme:dark}
.fsep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.presets{display:flex;gap:4px}
.pbtn{font-size:11px;font-weight:500;padding:4px 9px;height:28px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.pbtn:hover{background:var(--surface2);color:var(--text);border-color:var(--accent)}
.pbtn.active{background:var(--blue-dim);color:var(--accent2);border-color:var(--accent)}

/* PILLS */
#pills{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:.4rem 1.75rem;background:var(--bg);border-bottom:1px solid var(--border)}
#pills:empty{display:none;padding:0;border:none}
.pill{display:flex;align-items:center;gap:4px;font-size:11px;background:var(--blue-dim);color:var(--accent2);border:1px solid rgba(79,126,240,.22);border-radius:99px;padding:2px 10px 2px 9px;cursor:pointer}
.pill:hover{background:rgba(79,126,240,.22)}
.pill-x{font-size:13px;opacity:.6;line-height:1}
.pill-count{font-size:11px;color:var(--muted)}

/* MAIN */
main{max-width:1120px;margin:0 auto;padding:1.5rem 1.5rem 4rem}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.5rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.15rem;position:relative;overflow:hidden;transition:border-color .15s,transform .15s}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px)}
.kpi-stripe{position:absolute;top:0;left:0;right:0;height:2px;opacity:.7}
.kpi-icon{font-size:17px;margin-bottom:7px;opacity:.85}
.kpi-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.kpi-value{font-size:28px;font-weight:700;line-height:1;letter-spacing:-.025em}
.kpi-value.g{color:var(--green)}.kpi-value.r{color:var(--red)}.kpi-value.a{color:var(--amber)}.kpi-value.b{color:var(--accent2)}
.kpi-sub{font-size:11px;color:var(--hint);margin-top:5px}
.bar-bg{height:3px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:7px}
.bar-fg{height:100%;border-radius:99px;transition:width .5s ease}

/* SECTION */
.slabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--hint);margin-bottom:.65rem;display:flex;align-items:center;gap:7px}
.slabel::after{content:'';flex:1;height:1px;background:var(--border)}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.ctitle{font-size:13px;font-weight:600;margin-bottom:.85rem;display:flex;align-items:center;justify-content:space-between;color:var(--text)}
.csub{font-size:11px;color:var(--hint);margin-top:7px}
.mb{margin-bottom:14px}

/* LAYOUTS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}

/* LEGEND */
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;font-size:11px;color:var(--muted)}
.ldot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle;flex-shrink:0}
.li{display:flex;align-items:center}

/* CHART */
.cw{position:relative;width:100%}

/* HEATMAP */
.heatmap{overflow-x:auto}
.hm{border-collapse:separate;border-spacing:3px;width:100%;font-size:12px}
.hm th{font-weight:500;font-size:10.5px;color:var(--muted);padding:6px 10px;text-align:center}
.hm td{padding:7px 10px;text-align:center;font-weight:700;font-size:12px;border-radius:6px;transition:transform .12s;cursor:default}
.hm td:hover{transform:scale(1.07)}
.hm .rl{text-align:left;font-weight:400;color:var(--muted);font-size:11px;white-space:nowrap;padding-right:14px}
.ca{background:rgba(82,196,105,.2);color:#7ddc95}
.cb{background:rgba(224,160,48,.18);color:#f0be6a}
.cc{background:rgba(224,86,86,.18);color:#f08080}
.cn{background:var(--surface2);color:var(--hint);font-weight:400}

/* TABLE */
.dtable{width:100%;border-collapse:collapse;font-size:12px}
.dtable th{font-size:10.5px;font-weight:600;color:var(--muted);text-align:left;padding:7px 12px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em;cursor:pointer;user-select:none;white-space:nowrap}
.dtable th:hover{color:var(--text)}
.dtable td{padding:9px 12px;border-bottom:1px solid var(--border)}
.dtable tr:last-child td{border-bottom:none}
.dtable tbody tr:hover td{background:var(--surface2)}
.sarr{margin-left:3px;opacity:.35;font-size:10px}
.sarr.on{opacity:1;color:var(--accent2)}

/* BADGES / PILLS */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:.04em}
.ba{background:var(--green-dim);color:var(--green)}.bb{background:var(--amber-dim);color:var(--amber)}.bc{background:var(--red-dim);color:var(--red)}.bn{background:rgba(122,136,160,.1);color:var(--muted)}
.sp{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
.spg{background:var(--green-dim);color:var(--green)}.spa{background:var(--amber-dim);color:var(--amber)}.spr{background:var(--red-dim);color:var(--red)}

/* MISC */
.nodata{text-align:center;padding:2rem;color:var(--hint);font-size:12px}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px}
.spinner{width:34px;height:34px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.errbox{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,86,86,.22);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1rem;font-size:13px}

@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}}
@media(max-width:600px){main{padding:1rem}header,#filter-bar{padding-left:1rem;padding-right:1rem}.kpis{grid-template-columns:repeat(2,1fr)}#filter-bar{flex-direction:column;align-items:flex-start}.fdate{width:115px}}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">📈</div>
    <div>
      <h1>ICT Backtesting Dashboard</h1>
      <div class="sub">Session interaction analysis &middot; fwagni</div>
    </div>
  </div>
  <div id="last-updated"><span class="dot"></span>Loading&hellip;</div>
</header>

<div id="filter-bar">
  <div class="fg">
    <span class="flabel">Period</span>
    <div class="presets">
      <button class="pbtn" data-p="7d"  onclick="setPreset('7d')">7D</button>
      <button class="pbtn" data-p="1m"  onclick="setPreset('1m')">1M</button>
      <button class="pbtn" data-p="3m"  onclick="setPreset('3m')">3M</button>
      <button class="pbtn" data-p="6m"  onclick="setPreset('6m')">6M</button>
      <button class="pbtn" data-p="ytd" onclick="setPreset('ytd')">YTD</button>
      <button class="pbtn active" data-p="all" onclick="setPreset('all')">All</button>
    </div>
  </div>
  <div class="fsep"></div>
  <div class="fg">
    <span class="flabel">From</span>
    <input type="date" id="f-start" class="fdate" onchange="onCustDate()">
    <span class="flabel">To</span>
    <input type="date" id="f-end" class="fdate" onchange="onCustDate()">
  </div>
  <div class="fsep"></div>
  <div class="fg">
    <select id="f-inst" class="fsel" onchange="render()"><option value="">All instruments</option></select>
    <select id="f-kz" class="fsel" onchange="render()">
      <option value="">All kill zones</option>
      <option>London Open</option><option>NY AM</option><option>NY Lunch</option><option>NY PM</option>
    </select>
    <select id="f-news" class="fsel" onchange="render()">
      <option value="">News: all</option>
      <option value="no">No news days</option>
      <option value="yes">News days only</option>
    </select>
    <select id="f-htf" class="fsel" onchange="render()">
      <option value="">HTF: all</option>
      <option value="yes">HTF aligned</option>
      <option value="no">HTF not aligned</option>
    </select>
  </div>
</div>

<div id="pills"></div>

<main id="app">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div style="color:var(--muted);font-size:13px">Loading backtest_log.csv&hellip;</div>
  </div>
</main>

<script>
const CSV = './backtest_log.csv';
const C = {
  win:'#52c469',loss:'#e05656',be:'#e0a030',nt:'#3d4a60',
  p:['#52c469','#e05656','#e0a030','#4f7ef0','#a78bfa','#38bdf8','#f472b6','#fb923c','#64748b','#2dd4bf','#facc15']
};
const KZS=['London Open','NY AM','NY Lunch','NY PM'];
const PATS=['Asia Low + London Low Swept','Asia High + London High Swept','Both Swept Low','Both Swept High','London Low Only','London High Only','Asia Low Only','Asia High Only','No Sweeps'];
const CDEFS={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},animation:{duration:350}};
const GC='rgba(255,255,255,0.04)';
const TF={size:11,family:"-apple-system,'Inter',sans-serif",color:'#7a88a0'};
const TT={backgroundColor:'#1a2035',titleColor:'#dde2ee',bodyColor:'#7a88a0',borderColor:'rgba(255,255,255,.08)',borderWidth:1,padding:10};

let allData=[],charts={},sortCol='wr',sortDir=-1;

function dc(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function pct(n,d){return d?Math.round(n/d*100):null;}
function avg(a){return a.length?+(a.reduce((s,v)=>s+v,0)/a.length).toFixed(2):null;}
function wr(arr){const d=arr.filter(r=>['Win','Loss','Breakeven'].includes(r.Result));return d.length?pct(arr.filter(r=>r.Result==='Win').length,d.length):null;}
function grade(w,n){if(n<3)return'N';if(w>=60&&n>=20)return'A';if(w>=50&&n>=10)return'B';if(n>=5)return'C';return'N';}
function today(){return new Date().toISOString().slice(0,10);}
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function wrColor(w){if(w==null)return'var(--muted)';return w>=60?'var(--green)':w>=45?'var(--amber)':'var(--red)';}

/* PRESETS */
let activePreset='all';
function setPreset(p){
  activePreset=p;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.toggle('active',b.dataset.p===p));
  const now=today();
  const map={'7d':addDays(now,-7),'1m':addDays(now,-30),'3m':addDays(now,-90),'6m':addDays(now,-180)};
  if(p==='all'){document.getElementById('f-start').value='';document.getElementById('f-end').value='';}
  else if(p==='ytd'){document.getElementById('f-start').value=new Date().getFullYear()+'-01-01';document.getElementById('f-end').value=now;}
  else{document.getElementById('f-start').value=map[p];document.getElementById('f-end').value=now;}
  render();
}
function onCustDate(){
  activePreset='custom';
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  render();
}

/* FILTER */
function applyFilters(){
  const s=document.getElementById('f-start').value,e=document.getElementById('f-end').value;
  const inst=document.getElementById('f-inst').value,kz=document.getElementById('f-kz').value;
  const news=document.getElementById('f-news').value,htf=document.getElementById('f-htf').value;
  return allData.filter(r=>{
    const d=r['Setup Date']||'';
    if(s&&d<s)return false;if(e&&d>e)return false;
    if(inst&&r.Instrument!==inst)return false;
    if(kz&&r['Kill Zone']!==kz)return false;
    if(news==='yes'&&r['News Day']!=='Yes')return false;
    if(news==='no'&&r['News Day']==='Yes')return false;
    if(htf==='yes'&&r['HTF Bias Aligned']!=='Yes')return false;
    if(htf==='no'&&r['HTF Bias Aligned']==='Yes')return false;
    return true;
  });
}

/* PILLS */
let _clears=[];
function updatePills(){
  const s=document.getElementById('f-start').value,e=document.getElementById('f-end').value;
  const inst=document.getElementById('f-inst').value,kz=document.getElementById('f-kz').value;
  const news=document.getElementById('f-news').value,htf=document.getElementById('f-htf').value;
  const pills=[];
  if(s||e)pills.push({l:(s||'…')+' \u2192 '+(e||'…'),c:()=>{document.getElementById('f-start').value='';document.getElementById('f-end').value='';setPreset('all');}});
  if(inst)pills.push({l:inst,c:()=>{document.getElementById('f-inst').value='';render();}});
  if(kz)pills.push({l:kz,c:()=>{document.getElementById('f-kz').value='';render();}});
  if(news)pills.push({l:news==='yes'?'News days':'No news',c:()=>{document.getElementById('f-news').value='';render();}});
  if(htf)pills.push({l:htf==='yes'?'HTF aligned':'HTF not aligned',c:()=>{document.getElementById('f-htf').value='';render();}});
  _clears=pills.map(p=>p.c);
  const bar=document.getElementById('pills');
  bar.innerHTML=pills.length
    ?`<span class="pill-count">${pills.length} filter${pills.length>1?'s':''} active</span>`+pills.map((p,i)=>`<span class="pill" onclick="_clears[${i}]()">${p.l}<span class="pill-x">&times;</span></span>`).join('')
    :'';
}

/* RENDER */
function render(){
  updatePills();
  const data=applyFilters();
  const taken=data.filter(r=>r['Entry Taken']==='Yes');
  const dec=taken.filter(r=>['Win','Loss','Breakeven'].includes(r.Result));
  const wins=dec.filter(r=>r.Result==='Win').length;
  const losses=dec.filter(r=>r.Result==='Loss').length;
  const w=pct(wins,dec.length);
  const rrs=dec.filter(r=>r['RR Achieved']&&parseFloat(r['RR Achieved'])>0).map(r=>parseFloat(r['RR Achieved']));
  const aRR=avg(rrs);
  const edge=w&&aRR?(w/100*aRR).toFixed(2):null;
  const selRate=data.length?Math.round(taken.length/data.length*100):0;

  // populate instrument select
  const iSel=document.getElementById('f-inst'),curI=iSel.value;
  const insts=[...new Set(allData.map(r=>r.Instrument).filter(Boolean))].sort();
  iSel.innerHTML='<option value="">All instruments</option>'+insts.map(i=>`<option${curI===i?' selected':''}>${i}</option>`).join('');

  const wCls=w>=55?'g':w>=45?'a':'r';
  const rCls=aRR>=2?'g':aRR>=1?'a':'r';
  const eCls=edge>=1.2?'g':edge>=0.8?'a':'r';
  const wBar=w?`<div class="bar-bg"><div class="bar-fg" style="width:${w}%;background:${w>=55?'var(--green)':w>=45?'var(--amber)':'var(--red)'}"></div></div>`:'';

  document.getElementById('app').innerHTML=`
  <div class="kpis">
    <div class="kpi"><div class="kpi-stripe" style="background:var(--accent)"></div><div class="kpi-icon">&#x1F5C2;</div><div class="kpi-label">Total setups</div><div class="kpi-value b">${data.length}</div><div class="kpi-sub">days studied</div></div>
    <div class="kpi"><div class="kpi-stripe" style="background:var(--accent)"></div><div class="kpi-icon">&#x1F3AF;</div><div class="kpi-label">Entries taken</div><div class="kpi-value b">${taken.length}</div><div class="kpi-sub">${selRate}% selection rate</div><div class="bar-bg"><div class="bar-fg" style="width:${selRate}%;background:var(--accent)"></div></div></div>
    <div class="kpi"><div class="kpi-stripe" style="background:${w>=55?'var(--green)':w>=45?'var(--amber)':'var(--red)'}"></div><div class="kpi-icon">&#x1F4CA;</div><div class="kpi-label">Win rate</div><div class="kpi-value ${wCls}">${w!=null?w+'%':'&mdash;'}</div><div class="kpi-sub">${wins}W &middot; ${losses}L &middot; ${dec.length-wins-losses}BE</div>${wBar}</div>
    <div class="kpi"><div class="kpi-stripe" style="background:${aRR>=2?'var(--green)':aRR>=1?'var(--amber)':'var(--red)'}"></div><div class="kpi-icon">&#x2696;&#xFE0F;</div><div class="kpi-label">Avg R:R</div><div class="kpi-value ${rCls}">${aRR!=null?aRR+'R':'&mdash;'}</div><div class="kpi-sub">winning trades</div></div>
    <div class="kpi"><div class="kpi-stripe" style="background:${edge>=1.2?'var(--green)':edge>=0.8?'var(--amber)':'var(--red)'}"></div><div class="kpi-icon">&#x26A1;</div><div class="kpi-label">Edge score</div><div class="kpi-value ${eCls}">${edge||'&mdash;'}</div><div class="kpi-sub">win rate &times; avg R:R</div></div>
  </div>

  <div class="slabel">Win rate by session pattern</div>
  <div class="card mb">
    <div class="ctitle">Session pattern performance <span style="font-size:11px;font-weight:400;color:var(--muted)">entries taken only</span></div>
    <div class="leg" id="leg-p"></div>
    <div class="cw" style="height:275px"><canvas id="c-p"></canvas></div>
  </div>

  <div class="g2">
    <div><div class="slabel">Results breakdown</div><div class="card"><div class="ctitle">All entries taken</div><div class="leg" id="leg-r"></div><div class="cw" style="height:190px"><canvas id="c-r"></canvas></div></div></div>
    <div><div class="slabel">NY AM reaction</div><div class="card"><div class="ctitle">Reversal &middot; continuation &middot; chop</div><div class="leg" id="leg-ny"></div><div class="cw" style="height:190px"><canvas id="c-ny"></canvas></div></div></div>
  </div>

  <div class="slabel">Kill zone heatmap</div>
  <div class="card mb">
    <div class="ctitle">Win rate by pattern &times; kill zone</div>
    <div class="heatmap" id="hm"></div>
    <div class="csub"><span style="color:var(--green)">&#9632;</span> A &ge;60% (&ge;20 samples) &nbsp;<span style="color:var(--amber)">&#9632;</span> B &ge;50% (&ge;10) &nbsp;<span style="color:var(--red)">&#9632;</span> C &lt;50% &nbsp;<span style="color:var(--hint)">&#9632;</span> &lt;3 samples</div>
  </div>

  <div class="g2">
    <div><div class="slabel">Confluence vs win rate</div><div class="card"><div class="ctitle">More confluence = higher win rate?</div><div class="cw" style="height:190px"><canvas id="c-conf"></canvas></div><div class="csub">Rate 1&ndash;5 at entry &middot; use this to define your minimum threshold</div></div></div>
    <div><div class="slabel">HTF bias alignment</div><div class="card"><div class="ctitle">Impact of trading with the higher TF narrative</div><div class="cw" style="height:190px"><canvas id="c-htf"></canvas></div><div class="csub">How much does HTF alignment boost your win rate?</div></div></div>
  </div>

  <div class="slabel">Model performance</div>
  <div class="card mb">
    <div class="ctitle">Win rate vs avg R:R by model <span style="font-size:11px;font-weight:400;color:var(--muted)">bubble size = sample size &middot; top-right = best edge</span></div>
    <div class="cw" style="height:250px"><canvas id="c-m"></canvas></div>
  </div>

  <div class="slabel">Pattern detail table</div>
  <div class="card">
    <div class="ctitle">All patterns ranked <span style="font-size:11px;font-weight:400;color:var(--muted)">click columns to sort</span></div>
    <div id="ptable"></div>
  </div>`;

  buildPatChart(taken);
  buildResChart(taken);
  buildNYChart(data);
  buildHeatmap(taken);
  buildConfChart(taken);
  buildHTFChart(taken);
  buildModelChart(taken);
  buildTable(taken);
}

function buildPatChart(taken){
  const lb=[],va=[],co=[];
  PATS.forEach((p,i)=>{
    const g=taken.filter(r=>r['Pattern Tag']===p),w=wr(g);
    if(g.length>=1){lb.push(p);va.push(w??0);co.push(C.p[i%C.p.length]);}
  });
  [...new Set(taken.map(r=>r['Pattern Tag']))].forEach(p=>{
    if(!PATS.includes(p)&&p){const g=taken.filter(r=>r['Pattern Tag']===p);lb.push(p);va.push(wr(g)??0);co.push(C.p[lb.length%C.p.length]);}
  });
  document.getElementById('leg-p').innerHTML=lb.map((l,i)=>`<span class="li"><span class="ldot" style="background:${co[i]}"></span>${l.length>30?l.slice(0,28)+'&hellip;':l}&nbsp;<strong style="color:var(--text)">${va[i]}%</strong></span>`).join('');
  dc('p');
  charts['p']=new Chart(document.getElementById('c-p'),{type:'bar',data:{labels:lb,datasets:[{data:va,backgroundColor:co.map(c=>c+'bb'),borderColor:co,borderWidth:1,borderRadius:5,borderSkipped:false}]},options:{...CDEFS,scales:{x:{ticks:{...TF,maxRotation:28},grid:{color:GC}},y:{min:0,max:100,ticks:{callback:v=>v+'%',...TF},grid:{color:GC}}},plugins:{...CDEFS.plugins,tooltip:{callbacks:{label:c=>` ${c.parsed.y}% win rate`},...TT}}}});
}

function buildResChart(taken){
  const cnt={Win:0,Loss:0,Breakeven:0,'No Trade':0};
  taken.forEach(r=>{if(cnt[r.Result]!==undefined)cnt[r.Result]++;});
  const lb=Object.keys(cnt).filter(k=>cnt[k]>0),va=lb.map(k=>cnt[k]);
  const cl=lb.map(k=>({Win:C.win,Loss:C.loss,Breakeven:C.be,'No Trade':C.nt}[k]));
  document.getElementById('leg-r').innerHTML=lb.map((l,i)=>`<span class="li"><span class="ldot" style="background:${cl[i]}"></span>${l}&nbsp;<strong style="color:var(--text)">${va[i]}</strong></span>`).join('');
  dc('r');
  charts['r']=new Chart(document.getElementById('c-r'),{type:'doughnut',data:{labels:lb,datasets:[{data:va,backgroundColor:cl.map(c=>c+'bb'),borderColor:cl,borderWidth:1,hoverOffset:4}]},options:{...CDEFS,cutout:'65%',plugins:{...CDEFS.plugins,tooltip:{...TT}}}});
}

function buildNYChart(data){
  const rx=['Reversal','Continuation','Chop'],cl=[C.win,'#4f7ef0','#3d4a60'];
  const va=rx.map(r=>data.filter(d=>d['NY AM Reaction']===r).length);
  const lb=rx.filter((_,i)=>va[i]>0),fv=va.filter(v=>v>0),fc=rx.map((r,i)=>[cl[i],va[i]]).filter(([,v])=>v>0).map(([c])=>c);
  document.getElementById('leg-ny').innerHTML=lb.map((l,i)=>`<span class="li"><span class="ldot" style="background:${fc[i]}"></span>${l}&nbsp;<strong style="color:var(--text)">${fv[i]}</strong></span>`).join('');
  dc('ny');
  charts['ny']=new Chart(document.getElementById('c-ny'),{type:'doughnut',data:{labels:lb,datasets:[{data:fv,backgroundColor:fc.map(c=>c+'bb'),borderColor:fc,borderWidth:1,hoverOffset:4}]},options:{...CDEFS,cutout:'65%',plugins:{...CDEFS.plugins,tooltip:{...TT}}}});
}

function buildHeatmap(taken){
  const pats=PATS.filter(p=>taken.some(r=>r['Pattern Tag']===p));
  const kzs=KZS.filter(k=>taken.some(r=>r['Kill Zone']===k));
  if(!pats.length||!kzs.length){document.getElementById('hm').innerHTML='<div class="nodata">Not enough data yet &mdash; add more entries.</div>';return;}
  function cls(w,n){if(n<3)return'cn';if(w>=60)return'ca';if(w>=50)return'cb';return'cc';}
  let h=`<table class="hm"><thead><tr><th></th>${kzs.map(k=>`<th>${k}</th>`).join('')}</tr></thead><tbody>`;
  pats.forEach(p=>{
    h+=`<tr><td class="rl">${p}</td>`;
    kzs.forEach(k=>{const g=taken.filter(r=>r['Pattern Tag']===p&&r['Kill Zone']===k),w=wr(g);h+=`<td class="${cls(w??0,g.length)}" title="${g.length} setups">${g.length<3?'&lt;3':w+'%'}</td>`;});
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('hm').innerHTML=h;
}

function buildConfChart(taken){
  const data=[1,2,3,4,5].map(s=>{const g=taken.filter(r=>parseInt(r['Confluence Score'])===s);return{w:wr(g),n:g.length};});
  const lb=[1,2,3,4,5].filter((_,i)=>data[i].w!==null).map(s=>'Score '+s);
  const va=data.filter(d=>d.w!==null).map(d=>d.w);
  const bg=va.map(v=>v>=60?C.win+'bb':v>=45?C.be+'bb':C.loss+'bb');
  const bo=va.map(v=>v>=60?C.win:v>=45?C.be:C.loss);
  dc('conf');
  charts['conf']=new Chart(document.getElementById('c-conf'),{type:'bar',data:{labels:lb,datasets:[{data:va,backgroundColor:bg,borderColor:bo,borderWidth:1,borderRadius:5,borderSkipped:false}]},options:{...CDEFS,scales:{x:{ticks:{...TF},grid:{color:GC}},y:{min:0,max:100,ticks:{callback:v=>v+'%',...TF},grid:{color:GC}}},plugins:{...CDEFS.plugins,tooltip:{callbacks:{label:c=>` ${c.parsed.y}% win rate`},...TT}}}});
}

function buildHTFChart(taken){
  const al=taken.filter(r=>r['HTF Bias Aligned']==='Yes'),na=taken.filter(r=>r['HTF Bias Aligned']!=='Yes');
  const va=[wr(al)??0,wr(na)??0];
  const bg=va.map(v=>v>=55?C.win+'bb':v>=45?C.be+'bb':C.loss+'bb');
  const bo=va.map(v=>v>=55?C.win:v>=45?C.be:C.loss);
  dc('htf');
  charts['htf']=new Chart(document.getElementById('c-htf'),{type:'bar',data:{labels:['HTF Aligned','Not Aligned'],datasets:[{data:va,backgroundColor:bg,borderColor:bo,borderWidth:1,borderRadius:5,borderSkipped:false}]},options:{...CDEFS,scales:{x:{ticks:{...TF},grid:{color:GC}},y:{min:0,max:100,ticks:{callback:v=>v+'%',...TF},grid:{color:GC}}},plugins:{...CDEFS.plugins,tooltip:{callbacks:{label:c=>` ${c.parsed.y}% win rate`},...TT}}}});
}

function buildModelChart(taken){
  const models=[...new Set(taken.map(r=>r['Entry Model']).filter(Boolean))];
  const ds=models.map((m,i)=>{
    const g=taken.filter(r=>r['Entry Model']===m);
    const w=wr(g)??0,rrs=g.filter(r=>r['RR Achieved']&&parseFloat(r['RR Achieved'])>0).map(r=>parseFloat(r['RR Achieved']));
    const ar=avg(rrs)??0,col=C.p[i%C.p.length];
    return{label:m,data:[{x:w,y:ar,r:Math.max(7,g.length*5)}],backgroundColor:col+'99',borderColor:col,borderWidth:1.5};
  });
  if(!ds.length){document.getElementById('c-m').parentElement.innerHTML='<div class="nodata">No model data yet &mdash; add Entry Model values.</div>';return;}
  dc('m');
  charts['m']=new Chart(document.getElementById('c-m'),{type:'bubble',data:{datasets:ds},options:{...CDEFS,scales:{x:{min:0,max:110,title:{display:true,text:'Win rate %',color:'#7a88a0',font:{size:11}},ticks:{callback:v=>v+'%',...TF},grid:{color:GC}},y:{min:0,title:{display:true,text:'Avg R:R',color:'#7a88a0',font:{size:11}},ticks:{...TF},grid:{color:GC}}},plugins:{legend:{display:true,position:'bottom',labels:{color:'#7a88a0',boxWidth:10,padding:14,font:{size:11}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.x}% WR \u00b7 ${c.parsed.y.toFixed(1)}R`},...TT}},layout:{padding:10}}});
}

function buildTable(taken){
  const rows=PATS.map(p=>{
    const g=taken.filter(r=>r['Pattern Tag']===p);if(!g.length)return null;
    const w=wr(g),rrs=g.filter(r=>r['RR Achieved']&&parseFloat(r['RR Achieved'])>0).map(r=>parseFloat(r['RR Achieved']));
    const ar=avg(rrs),gr=grade(w??0,g.length),ed=w&&ar?(w/100*ar).toFixed(2):null;
    return{pattern:p,n:g.length,wr:w,arr:ar,grade:gr,edge:ed};
  }).filter(Boolean);
  [...new Set(taken.map(r=>r['Pattern Tag']))].forEach(p=>{
    if(!PATS.includes(p)&&p){
      const g=taken.filter(r=>r['Pattern Tag']===p),w=wr(g);
      const rrs=g.filter(r=>r['RR Achieved']&&parseFloat(r['RR Achieved'])>0).map(r=>parseFloat(r['RR Achieved']));
      const ar=avg(rrs),gr=grade(w??0,g.length);
      rows.push({pattern:p,n:g.length,wr:w,arr:ar,grade:gr,edge:w&&ar?(w/100*ar).toFixed(2):null});
    }
  });
  rows.sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(av===null||av===undefined)av=-999;if(bv===null||bv===undefined)bv=-999;
    if(typeof av==='string')return av.localeCompare(bv)*sortDir;
    return(bv-av)*sortDir;
  });
  if(!rows.length){document.getElementById('ptable').innerHTML='<div class="nodata">No data yet.</div>';return;}
  const bc=g=>({A:'ba',B:'bb',C:'bc',N:'bn'}[g]);
  const ar=c=>`<span class="sarr${sortCol===c?' on':''}">${sortCol===c&&sortDir===1?'&uarr;':'&darr;'}</span>`;
  document.getElementById('ptable').innerHTML=`<table class="dtable"><thead><tr>
    <th onclick="sortT('pattern')">Pattern ${ar('pattern')}</th>
    <th onclick="sortT('n')">Setups ${ar('n')}</th>
    <th onclick="sortT('wr')">Win rate ${ar('wr')}</th>
    <th onclick="sortT('arr')">Avg R:R ${ar('arr')}</th>
    <th onclick="sortT('edge')">Edge score ${ar('edge')}</th>
    <th onclick="sortT('grade')">Grade ${ar('grade')}</th>
  </tr></thead><tbody>${rows.map(r=>`<tr>
    <td style="font-weight:500">${r.pattern}</td>
    <td>${r.n}</td>
    <td><span class="sp ${r.wr>=55?'spg':r.wr>=45?'spa':'spr'}">${r.wr!=null?r.wr+'%':'&mdash;'}</span></td>
    <td style="font-weight:600;color:${r.arr>=2?'var(--green)':r.arr>=1?'var(--amber)':'var(--muted)'}">${r.arr!=null?r.arr+'R':'&mdash;'}</td>
    <td style="font-weight:600;color:var(--accent2)">${r.edge||'&mdash;'}</td>
    <td><span class="badge ${bc(r.grade)}">${r.grade}</span></td>
  </tr>`).join('')}</tbody></table>`;
}

function sortT(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}buildTable(applyFilters().filter(r=>r['Entry Taken']==='Yes'));}

/* INIT */
function init(){
  Papa.parse(CSV,{
    download:true,header:true,skipEmptyLines:true,
    complete(res){
      if(!res.data.length){document.getElementById('app').innerHTML='<div class="errbox">No data found in backtest_log.csv.</div>';return;}
      allData=res.data;
      const dates=allData.map(r=>r['Setup Date']).filter(Boolean).sort();
      const first=dates[0]||'&mdash;',last=dates[dates.length-1]||'&mdash;';
      document.getElementById('last-updated').innerHTML=`<span class="dot"></span>${allData.length} setups &middot; ${first} &rarr; ${last}`;
      render();
    },
    error(err){document.getElementById('app').innerHTML=`<div class="errbox">Could not load backtest_log.csv: ${err.message||err}</div>`;}
  });
}
init();
</script>
