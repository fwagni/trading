<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT Backtesting Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ═══════════════════════════════════════════════
   THEME TOKENS
   System preference is the default; .light / .dark
   classes on <html> allow manual override.
═══════════════════════════════════════════════ */
:root {
  color-scheme: dark light;
}

/* ── DARK (default / prefers-color-scheme: dark) ── */
html.dark, @media (prefers-color-scheme: dark) { :root:not(.light) {
  --bg:     #0b0f1a;
  --bg2:    #10151f;
  --s1:     #141c2e;
  --s2:     #19223a;
  --s3:     #1f2840;
  --border: rgba(255,255,255,0.06);
  --bdr2:   rgba(255,255,255,0.11);
  --text:   #dce3f2;
  --text2:  #b0bdd4;   /* ↑ was --sub, now brighter  */
  --text3:  #7a8fa8;   /* ↑ was --hint, bumped up    */
  --accent: #4f7ef0;
  --ac2:    #7fa4ff;
  --green:  #4ecb71;
  --green2: rgba(78,203,113,0.14);
  --red:    #e05c5c;
  --red2:   rgba(224,92,92,0.14);
  --amber:  #e0a830;
  --amber2: rgba(224,168,48,0.14);
  --blue2:  rgba(79,126,240,0.13);
  --purple: #a78bfa;
  --theme-icon: '☀️';
}}

/* ── LIGHT ───────────────────────────────────── */
html.light, @media (prefers-color-scheme: light) { :root:not(.dark) {
  --bg:     #f2f4f8;
  --bg2:    #ffffff;
  --s1:     #ffffff;
  --s2:     #f7f8fb;
  --s3:     #edf0f5;
  --border: rgba(0,0,0,0.08);
  --bdr2:   rgba(0,0,0,0.14);
  --text:   #111827;
  --text2:  #374151;
  --text3:  #6b7280;
  --accent: #2563eb;
  --ac2:    #1d4ed8;
  --green:  #16a34a;
  --green2: rgba(22,163,74,0.10);
  --red:    #dc2626;
  --red2:   rgba(220,38,38,0.10);
  --amber:  #b45309;
  --amber2: rgba(180,83,9,0.10);
  --blue2:  rgba(37,99,235,0.10);
  --purple: #7c3aed;
  --theme-icon: '🌙';
}}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13.5px;
  line-height: 1.6;
  min-height: 100vh;
  transition: background .2s, color .2s;
}
::-webkit-scrollbar { width: 5px; height: 5px }
::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 99px }

/* ═══════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════ */
#hdr {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: .8rem 1.75rem;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  backdrop-filter: blur(16px);
}
.hdr-l { display:flex; align-items:center; gap:12px }
.hdr-logo {
  width:34px; height:34px;
  background: linear-gradient(135deg,#4f7ef0,#8b5cf6);
  border-radius:9px; display:flex; align-items:center; justify-content:center;
  font-size:17px; flex-shrink:0;
}
.hdr-title { font-size:14.5px; font-weight:600; letter-spacing:-.02em; line-height:1.2; color:var(--text) }
.hdr-sub   { font-size:12px; color:var(--text3); margin-top:1px }

.hdr-r { display:flex; align-items:center; gap:8px }
#last-upd {
  font-size:12px; color:var(--text2);
  background:var(--s1); border:1px solid var(--border);
  padding:4px 12px; border-radius:99px;
  white-space:nowrap; display:flex; align-items:center; gap:6px;
}
.dot { width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 7px var(--green);animation:pulse 2.4s infinite }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* theme toggle button */
#theme-btn {
  width:32px; height:32px;
  background:var(--s1); border:1px solid var(--border);
  border-radius:8px; cursor:pointer; font-size:15px;
  display:flex; align-items:center; justify-content:center;
  transition:border-color .15s, background .15s;
  flex-shrink:0;
}
#theme-btn:hover { border-color:var(--accent); background:var(--s2) }

/* ═══════════════════════════════════════════════
   FILTER BAR
═══════════════════════════════════════════════ */
#fbar {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:.6rem 1.75rem; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  position:sticky; top:57px; z-index:199;
}
.fg { display:flex; align-items:center; gap:6px }
/* filter labels — now text2 instead of text3 */
.fl { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap }
.fsel,.fdate {
  font-size:12.5px; padding:5px 9px; height:30px;
  border:1px solid var(--bdr2); border-radius:8px;
  background:var(--s1); color:var(--text); cursor:pointer; outline:none;
  font-family:inherit; transition:border-color .12s, box-shadow .12s;
}
.fsel:hover,.fdate:hover { border-color:var(--accent) }
.fsel:focus,.fdate:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--blue2) }
.fdate { width:130px; color-scheme:dark light }
.fsep  { width:1px; height:18px; background:var(--border); flex-shrink:0 }
.presets { display:flex; gap:3px }
.pb {
  font-size:11.5px; font-weight:500; padding:4px 9px; height:28px;
  border:1px solid var(--border); border-radius:6px;
  background:transparent; color:var(--text2); cursor:pointer;
  font-family:inherit; transition:all .12s; white-space:nowrap;
}
.pb:hover { background:var(--s3); color:var(--text); border-color:var(--accent) }
.pb.on    { background:var(--blue2); color:var(--ac2); border-color:var(--accent) }

/* ── ACTIVE FILTER PILLS ─────────────── */
.pill-bar {
  display:flex; flex-wrap:wrap; gap:5px; align-items:center;
  padding:.4rem 1.75rem; background:var(--bg); border-bottom:1px solid var(--border);
}
.pill-bar:empty { display:none; padding:0; border:none }
.pill {
  display:flex; align-items:center; gap:4px;
  font-size:12px; font-weight:500;
  background:var(--blue2); color:var(--ac2);
  border:1px solid rgba(79,126,240,.22); border-radius:99px;
  padding:3px 10px 3px 9px; cursor:pointer;
}
.pill:hover { background:rgba(79,126,240,.22) }
.pill-x { opacity:.6; font-size:14px; line-height:1 }
.pc { font-size:12px; color:var(--text3); font-weight:500 }

/* ═══════════════════════════════════════════════
   MAIN / GRID
═══════════════════════════════════════════════ */
main { max-width:1140px; margin:0 auto; padding:1.5rem 1.5rem 5rem }
.row  { display:grid; gap:14px; margin-bottom:14px }
.c2   { grid-template-columns:1fr 1fr }
.c3   { grid-template-columns:1fr 1fr 1fr }
.c4   { grid-template-columns:1fr 1fr 1fr 1fr }
.c32  { grid-template-columns:1.6fr 1fr }
.mb   { margin-bottom:14px }

/* ── SECTION LABELS ──────────────────── */
.slbl {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.09em; color:var(--text3);
  margin-bottom:.65rem; display:flex; align-items:center; gap:8px;
}
.slbl::after { content:''; flex:1; height:1px; background:var(--border) }

/* ── CARD ────────────────────────────── */
.card {
  background:var(--s1); border:1px solid var(--border); border-radius:12px;
  padding:1.2rem; transition:border-color .15s; position:relative; overflow:hidden;
}
.card:hover { border-color:var(--bdr2) }
.ct {
  font-size:13px; font-weight:600; margin-bottom:.85rem;
  display:flex; align-items:baseline; gap:6px;
  flex-wrap:wrap; color:var(--text);
}
/* card subtitles are now text3 but 12px minimum */
.ct-sub { font-size:12px; font-weight:400; color:var(--text3) }
/* descriptive captions below charts */
.csub   { font-size:12px; color:var(--text3); margin-top:8px; line-height:1.55 }

/* ── KPI CARDS ───────────────────────── */
.kpi {
  background:var(--s1); border:1px solid var(--border); border-radius:12px;
  padding:1.1rem 1.15rem; position:relative; overflow:hidden;
  transition:border-color .15s, transform .15s;
}
.kpi:hover { border-color:var(--bdr2); transform:translateY(-1px) }
.kpi-stripe { position:absolute; top:0; left:0; right:0; height:2px }
.kpi-ico    { font-size:18px; margin-bottom:7px; line-height:1 }
/* KPI label: was 10px hint → 11.5px text3 */
.kpi-lbl    { font-size:11.5px; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px }
.kpi-val    { font-size:30px; font-weight:700; line-height:1; letter-spacing:-.03em }
.kpi-val.g  { color:var(--green) }
.kpi-val.r  { color:var(--red) }
.kpi-val.a  { color:var(--amber) }
.kpi-val.b  { color:var(--ac2) }
/* KPI hint: was 10.5px hint → 12px text3 */
.kpi-hint   { font-size:12px; color:var(--text3); margin-top:5px }
.kbar       { height:3px; background:var(--s3); border-radius:99px; margin-top:8px; overflow:hidden }
.kbar-f     { height:100%; border-radius:99px; transition:width .5s ease }

/* ── CHART WRAP ──────────────────────── */
.cw { position:relative; width:100% }

/* ── LEGEND ──────────────────────────── */
.leg  { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:9px; font-size:12px; color:var(--text2) }
.li   { display:flex; align-items:center; gap:4px; white-space:nowrap }
.ld   { width:9px; height:9px; border-radius:2px; flex-shrink:0 }

/* ── HEATMAP ─────────────────────────── */
.hm-wrap { overflow-x:auto }
.hmt     { border-collapse:separate; border-spacing:3px; width:100%; font-size:12px }
/* heatmap column headers: 11px text3 */
.hmt th  { font-size:11px; font-weight:600; color:var(--text3); text-align:center; padding:6px 10px; text-transform:uppercase; letter-spacing:.05em }
/* heatmap row labels: 12px text2 */
.hmt .rh { text-align:left; white-space:nowrap; font-weight:500; color:var(--text2); padding-right:14px; font-size:12px }
.hmt td  { padding:7px 12px; text-align:center; font-weight:700; font-size:12px; border-radius:6px; transition:transform .1s; cursor:default }
.hmt td:not(.rh):hover { transform:scale(1.07) }
.ca { background:rgba(78,203,113,.2);  color:#3baa58 }
.cb { background:rgba(224,168,48,.18); color:#b57a10 }
.cc { background:rgba(224,92,92,.17);  color:#c84040 }
.cn { background:var(--s3); color:var(--text3); font-weight:500; font-size:11.5px }

/* light-mode heatmap cell text adjustments */
html.light .ca,
@media(prefers-color-scheme:light){:root:not(.dark) .ca}{ color:#166534 }
html.light .cb,
@media(prefers-color-scheme:light){:root:not(.dark) .cb}{ color:#92400e }
html.light .cc,
@media(prefers-color-scheme:light){:root:not(.dark) .cc}{ color:#991b1b }

/* ── DATA TABLE ──────────────────────── */
.dtbl { width:100%; border-collapse:collapse; font-size:12.5px }
.dtbl th {
  font-size:11px; font-weight:700; color:var(--text3); text-align:left;
  padding:8px 12px; border-bottom:1px solid var(--border);
  text-transform:uppercase; letter-spacing:.06em; cursor:pointer; user-select:none; white-space:nowrap;
}
.dtbl th:hover { color:var(--text) }
.dtbl td { padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle }
.dtbl tr:last-child td { border-bottom:none }
.dtbl tbody tr:hover td { background:var(--s2) }
/* sort arrows: was opacity:.3, font-size:9px → now text3 + 11px */
.sa    { margin-left:3px; opacity:.4; font-size:11px; color:var(--text3) }
.sa.on { opacity:1; color:var(--ac2) }

/* ── BADGES ──────────────────────────── */
.bdg { display:inline-flex; align-items:center; font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px; letter-spacing:.03em }
.ba  { background:var(--green2); color:var(--green) }
.bb  { background:var(--amber2); color:var(--amber) }
.bc  { background:var(--red2);   color:var(--red)   }
.bn  { background:var(--s3);     color:var(--text3) }

.tag { display:inline-flex; align-items:center; font-size:11px; font-weight:600; padding:2px 8px; border-radius:99px }
.tg  { background:var(--green2); color:var(--green) }
.tr  { background:var(--red2);   color:var(--red)   }
.ta  { background:var(--amber2); color:var(--amber) }
.tb  { background:var(--blue2);  color:var(--ac2)   }
.tn  { background:var(--s3);     color:var(--text3) }

/* ── DIRECTION BAR ───────────────────── */
.dbar   { height:8px; border-radius:99px; overflow:hidden; background:var(--s3); display:flex; margin:6px 0 }
.dbar-l { background:var(--green); transition:width .5s ease }
.dbar-r { background:var(--red);   transition:width .5s ease }
/* direction bar legend: was 10.5px hint → 12px text2/text3 */
.dbar-legend { display:flex; justify-content:space-between; font-size:12px }

/* ── RING SVG ────────────────────────── */
.ring-svg   { transform:rotate(-90deg) }
.ring-bg    { fill:none; stroke:var(--s3); stroke-width:8 }
.ring-fg    { fill:none; stroke-width:8; stroke-linecap:round; transition:stroke-dashoffset .6s ease }
.ring-label { position:absolute; text-align:center; line-height:1.2 }
.ring-val   { font-size:22px; font-weight:700; letter-spacing:-.02em }
.ring-lbl   { font-size:11.5px; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-top:2px }

/* ── MISC ────────────────────────────── */
.nodata      { text-align:center; padding:2.5rem; color:var(--text3); font-size:13px }
.loading-wrap{ display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:65vh; gap:14px }
.spin        { width:32px; height:32px; border:2.5px solid var(--bdr2); border-top-color:var(--accent); border-radius:50%; animation:sp .7s linear infinite }
@keyframes sp{ to{transform:rotate(360deg)} }
.errbox      { background:var(--red2); color:var(--red); border:1px solid rgba(224,92,92,.22); border-radius:12px; padding:1rem 1.25rem; margin-bottom:1rem; font-size:13px }
.divider     { height:1px; background:var(--border); margin:1.25rem 0 }

/* ── RESPONSIVE ──────────────────────── */
@media(max-width:900px){ .c3,.c4{grid-template-columns:1fr 1fr} .c32{grid-template-columns:1fr} }
@media(max-width:600px){ main{padding:1rem} #hdr,#fbar{padding-left:1rem;padding-right:1rem} .c2,.c3,.c4{grid-template-columns:1fr} #fbar{flex-direction:column;align-items:flex-start} .fdate{width:116px} }
</style>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════ -->
<div id="hdr">
  <div class="hdr-l">
    <div class="hdr-logo">📈</div>
    <div>
      <div class="hdr-title">ICT Backtesting Dashboard</div>
      <div class="hdr-sub">Opportunity research &middot; session interactions &middot; fwagni</div>
    </div>
  </div>
  <div class="hdr-r">
    <div id="last-upd"><span class="dot"></span>Loading&hellip;</div>
    <button id="theme-btn" onclick="toggleTheme()" title="Toggle light / dark mode" aria-label="Toggle colour theme">🌙</button>
  </div>
</div>

<!-- ═══ FILTER BAR ═══════════════════════════ -->
<div id="fbar">
  <div class="fg">
    <span class="fl">Period</span>
    <div class="presets">
      <button class="pb" data-p="7d"  onclick="setPre('7d')">7D</button>
      <button class="pb" data-p="1m"  onclick="setPre('1m')">1M</button>
      <button class="pb" data-p="3m"  onclick="setPre('3m')">3M</button>
      <button class="pb" data-p="6m"  onclick="setPre('6m')">6M</button>
      <button class="pb" data-p="ytd" onclick="setPre('ytd')">YTD</button>
      <button class="pb on" data-p="all" onclick="setPre('all')">All</button>
    </div>
  </div>
  <div class="fsep"></div>
  <div class="fg">
    <span class="fl">From</span>
    <input type="date" id="f-s" class="fdate" onchange="onCD()">
    <span class="fl">To</span>
    <input type="date" id="f-e" class="fdate" onchange="onCD()">
  </div>
  <div class="fsep"></div>
  <div class="fg">
    <select id="f-i"  class="fsel" onchange="render()"><option value="">All instruments</option></select>
    <select id="f-kz" class="fsel" onchange="render()">
      <option value="">All kill zones</option>
      <option>London Open</option><option>NY AM</option><option>NY Lunch</option><option>NY PM</option>
    </select>
    <select id="f-n" class="fsel" onchange="render()">
      <option value="">News: all</option>
      <option value="none">No news</option>
      <option value="red">Red news</option>
      <option value="any">Any news</option>
    </select>
    <select id="f-d" class="fsel" onchange="render()">
      <option value="">All days</option>
      <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
      <option>Thursday</option><option>Friday</option>
    </select>
    <select id="f-htf" class="fsel" onchange="render()">
      <option value="">HTF: all</option>
      <option value="yes">HTF aligned</option>
      <option value="no">Not aligned</option>
    </select>
  </div>
</div>

<div class="pill-bar" id="pills"></div>

<!-- ═══ APP ROOT ══════════════════════════════ -->
<main id="app">
  <div class="loading-wrap">
    <div class="spin"></div>
    <div style="color:var(--text3);font-size:13.5px">Loading backtest_log.csv&hellip;</div>
  </div>
</main>

<script>
/* ═══════════════════════════════════════════
   THEME
═══════════════════════════════════════════ */
(function(){
  const saved = localStorage.getItem('ict-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const useDark = saved ? saved === 'dark' : prefersDark;
  document.documentElement.classList.add(useDark ? 'dark' : 'light');
})();

function toggleTheme(){
  const html = document.documentElement;
  const isDark = html.classList.contains('dark');
  html.classList.toggle('dark', !isDark);
  html.classList.toggle('light', isDark);
  localStorage.setItem('ict-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  updateChartDefaults();
  render();
}

function isDark(){
  return document.documentElement.classList.contains('dark');
}

function updateChartDefaults(){
  const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text3').trim();
  Chart.defaults.color = textColor;
}

/* ═══════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════ */
const CSV  = './backtest_log.csv';
const PATS = ['Asia Low + London Low Swept','Asia High + London High Swept',
              'Both Sessions Swept Low','Both Sessions Swept High',
              'London Low Only','London High Only',
              'Asia Low Swept Only','Asia High Swept Only','No Sweeps'];
const KZS  = ['London Open','NY AM','NY Lunch','NY PM'];
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const PAL  = ['#4ecb71','#e05c5c','#e0a830','#4f7ef0','#a78bfa','#38bdf8','#f472b6','#fb923c','#94a3b8','#2dd4bf'];

function gc(){ return isDark()?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.05)' }
function tf(){ return {size:11.5,family:"-apple-system,'Inter',sans-serif",color:getComputedStyle(document.documentElement).getPropertyValue('--text3').trim()} }
function tt(){ return {
  backgroundColor:isDark()?'#141c2e':'#ffffff',
  titleColor:isDark()?'#dce3f2':'#111827',
  bodyColor:isDark()?'#b0bdd4':'#374151',
  borderColor:isDark()?'rgba(255,255,255,.08)':'rgba(0,0,0,.1)',
  borderWidth:1, padding:10, cornerRadius:6,
}}
const CDEFS = { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, animation:{duration:350} };

let ALL=[], charts={}, sCol='freq', sDir=-1, _clears=[];

function dc(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } }
function pct(n,d){ return d ? Math.round(n/d*100) : 0 }
function avg(a){ return a.length ? +(a.reduce((s,v)=>s+v,0)/a.length).toFixed(2) : null }
function today(){ return new Date().toISOString().slice(0,10) }
function addDays(d,n){ const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10) }

/* ═══════════════════════════════════════════
   PRESETS & FILTERS
═══════════════════════════════════════════ */
function setPre(p){
  document.querySelectorAll('.pb').forEach(b=>b.classList.toggle('on',b.dataset.p===p));
  const now=today();
  const m={'7d':addDays(now,-7),'1m':addDays(now,-30),'3m':addDays(now,-90),'6m':addDays(now,-180)};
  if(p==='all'){ document.getElementById('f-s').value=''; document.getElementById('f-e').value=''; }
  else if(p==='ytd'){ document.getElementById('f-s').value=new Date().getFullYear()+'-01-01'; document.getElementById('f-e').value=now; }
  else { document.getElementById('f-s').value=m[p]; document.getElementById('f-e').value=now; }
  render();
}
function onCD(){ document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on')); render(); }

function filtered(){
  const s=document.getElementById('f-s').value, e=document.getElementById('f-e').value;
  const fi=document.getElementById('f-i').value, fk=document.getElementById('f-kz').value;
  const fn=document.getElementById('f-n').value, fd=document.getElementById('f-d').value;
  const fh=document.getElementById('f-htf').value;
  return ALL.filter(r=>{
    const d=r['Session Date']||'';
    if(s&&d<s) return false;
    if(e&&d>e) return false;
    if(fi&&r.Instrument!==fi) return false;
    if(fk&&r['Kill Zone']!==fk) return false;
    if(fn==='none'&&r['News Day']!=='None') return false;
    if(fn==='red'&&!['Red News','Red + Orange'].includes(r['News Day'])) return false;
    if(fn==='any'&&r['News Day']==='None') return false;
    if(fd&&r['Day of Week']!==fd) return false;
    if(fh==='yes'&&r['HTF Bias Aligned']!=='Yes') return false;
    if(fh==='no'&&r['HTF Bias Aligned']==='Yes') return false;
    return true;
  });
}

function updatePills(){
  const s=document.getElementById('f-s').value, e=document.getElementById('f-e').value;
  const fi=document.getElementById('f-i').value, fk=document.getElementById('f-kz').value;
  const fn=document.getElementById('f-n').value, fd=document.getElementById('f-d').value;
  const fh=document.getElementById('f-htf').value;
  const pills=[];
  if(s||e) pills.push({l:(s||'…')+' → '+(e||'…'), c:()=>{ document.getElementById('f-s').value=''; document.getElementById('f-e').value=''; setPre('all'); }});
  if(fi)   pills.push({l:fi,    c:()=>{ document.getElementById('f-i').value='';   render(); }});
  if(fk)   pills.push({l:fk,    c:()=>{ document.getElementById('f-kz').value='';  render(); }});
  if(fn)   pills.push({l:{none:'No news',red:'Red news',any:'Any news'}[fn], c:()=>{ document.getElementById('f-n').value=''; render(); }});
  if(fd)   pills.push({l:fd,    c:()=>{ document.getElementById('f-d').value='';   render(); }});
  if(fh)   pills.push({l:fh==='yes'?'HTF aligned':'HTF not aligned', c:()=>{ document.getElementById('f-htf').value=''; render(); }});
  _clears = pills.map(p=>p.c);
  const bar = document.getElementById('pills');
  bar.innerHTML = pills.length
    ? `<span class="pc">${pills.length} filter${pills.length>1?'s':''} active</span>`
      + pills.map((p,i)=>`<span class="pill" onclick="_clears[${i}]()">${p.l}<span class="pill-x">&times;</span></span>`).join('')
    : '';
}

/* ═══════════════════════════════════════════
   STATS
═══════════════════════════════════════════ */
function stats(rows){
  const ws = rows.filter(r=>r['Setup Appeared']==='Yes');
  const rrs   = ws.filter(r=>parseFloat(r['Potential RR'])>0).map(r=>parseFloat(r['Potential RR']));
  const quals = ws.filter(r=>parseFloat(r['Setup Quality (1-5)'])>0).map(r=>parseFloat(r['Setup Quality (1-5)']));
  const longs  = ws.filter(r=>r['Setup Direction']==='Long').length;
  const shorts = ws.filter(r=>r['Setup Direction']==='Short').length;
  return {
    total:   rows.length,
    withSetup: ws.length,
    freqPct: pct(ws.length, rows.length),
    avgRR:   avg(rrs),
    avgQual: avg(quals),
    longPct: pct(longs, ws.length),
    shortPct:pct(shorts, ws.length),
    longs, shorts,
  };
}

/* ─── Ring ─────────────────────────────── */
function buildKPIRing(freq, color){
  const svg = document.getElementById('ring-freq'); if(!svg) return;
  const r=56, circ=2*Math.PI*r, offset=circ-(freq/100)*circ;
  svg.innerHTML=`<circle class="ring-bg" cx="70" cy="70" r="${r}"/>
  <circle class="ring-fg" cx="70" cy="70" r="${r}" stroke="${color}"
    stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>`;
  const v=document.getElementById('rv-freq');
  if(v){ v.style.color=color; v.textContent=freq+'%'; }
}

    const g=data.filter(r=>r['Pattern Tag']===p);

  const labels=rows.map(r=>r.p);

    type:'bar',
    data:{labels,datasets:[{data:vals,backgroundColor:clrs.map(c=>c+'bb'),borderColor:clrs,borderWidth:1,borderRadius:5,borderSkipped:false}]},

/* ─── Kill zone heatmap ─────────────────── */
function buildKZHeatmap(data){
  const pats=PATS.filter(p=>data.some(r=>r['Pattern Tag']===p));
  const kzs=KZS.filter(k=>data.some(r=>r['Kill Zone']===k));
  if(!pats.length||!kzs.length){ document.getElementById('hm').innerHTML='<div class="nodata">Not enough data yet — add more sessions.</div>'; return; }
  function cls(f,n){ if(n<3) return 'cn'; if(f>=60) return 'ca'; if(f>=40) return 'cb'; return 'cc'; }
  let h=`<table class="hmt"><thead><tr><th></th>${kzs.map(k=>`<th>${k}</th>`).join('')}</tr></thead><tbody>`;
  pats.forEach(p=>{
    h+=`<tr><td class="rh">${p}</td>`;
    kzs.forEach(k=>{
      const g=data.filter(r=>r['Pattern Tag']===p&&r['Kill Zone']===k);
      const ws=g.filter(r=>r['Setup Appeared']==='Yes');
      const f=pct(ws.length,g.length);
      h+=`<td class="${cls(f,g.length)}" title="${g.length} obs · ${ws.length} setups">${g.length<3?'&lt;3':f+'%'}</td>`;
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  document.getElementById('hm').innerHTML=h;
}

/* ─── Pattern table ─────────────────────── */
function buildPatternTable(data){
  const rows=PATS.map(p=>{
    const g=data.filter(r=>r['Pattern Tag']===p);
    if(!g.length) return null;
    const ws=g.filter(r=>r['Setup Appeared']==='Yes');
    const freq=pct(ws.length,g.length);
    const rrs  =ws.filter(r=>parseFloat(r['Potential RR'])>0).map(r=>parseFloat(r['Potential RR']));
    const quals=ws.filter(r=>parseFloat(r['Setup Quality (1-5)'])>0).map(r=>parseFloat(r['Setup Quality (1-5)']));
    const longs =ws.filter(r=>r['Setup Direction']==='Long').length;
    const shorts=ws.filter(r=>r['Setup Direction']==='Short').length;
    const domDir=longs>shorts?'Long':shorts>longs?'Short':'Mixed';
    const typeMap=[...ws.reduce((m,r)=>{ if(r['Entry Type']) m.set(r['Entry Type'],(m.get(r['Entry Type'])||0)+1); return m; },new Map())].sort((a,b)=>b[1]-a[1]);
    const topType=typeMap[0]?typeMap[0][0]:'—';
    const nyMap=[...ws.reduce((m,r)=>{ if(r['NY AM Reaction']) m.set(r['NY AM Reaction'],(m.get(r['NY AM Reaction'])||0)+1); return m; },new Map())].sort((a,b)=>b[1]-a[1]);
    const domNY=nyMap[0]?nyMap[0][0]:'—';
    const aRR=avg(rrs), aQ=avg(quals);
    const grade=freq>=60&&(aRR??0)>=3&&g.length>=10?'A':freq>=45&&(aRR??0)>=2&&g.length>=5?'B':g.length>=3?'C':'N';
    return{p,n:g.length,ws:ws.length,freq,avgRR:aRR,avgQ:aQ,domDir,topType,domNY,grade};
  }).filter(Boolean);

  rows.sort((a,b)=>{
    let av=a[sCol]??-999, bv=b[sCol]??-999;
    if(typeof av==='string') return av.localeCompare(bv)*sDir;
    return (bv-av)*sDir;
  });

  if(!rows.length){ document.getElementById('ptbl').innerHTML='<div class="nodata">No data yet — add sessions to backtest_log.csv.</div>'; return; }

  const bc=g=>({A:'ba',B:'bb',C:'bc',N:'bn'}[g]);
  const ar=c=>`<span class="sa${sCol===c?' on':''}">${sCol===c&&sDir===1?'↑':'↓'}</span>`;
  const dirTag=d=>d==='Long'?`<span class="tag tg">↑ Long</span>`:d==='Short'?`<span class="tag tr">↓ Short</span>`:`<span class="tag tn">${d}</span>`;
  const nyTag=n=>n==='Reversal'?`<span class="tag tg">Reversal</span>`:n==='Continuation'?`<span class="tag tb">Continuation</span>`:n==='Chop'?`<span class="tag tn">Chop</span>`:`<span class="tag tn">${n}</span>`;

  document.getElementById('ptbl').innerHTML=`
  <table class="dtbl">
    <thead><tr>
      <th onclick="sortT('p')">Pattern ${ar('p')}</th>
      <th onclick="sortT('n')">Days ${ar('n')}</th>
      <th onclick="sortT('freq')">Freq ${ar('freq')}</th>
      <th onclick="sortT('avgRR')">Avg R:R ${ar('avgRR')}</th>
      <th onclick="sortT('avgQ')">Avg quality ${ar('avgQ')}</th>
      <th onclick="sortT('domDir')">Direction ${ar('domDir')}</th>
      <th>Top entry</th>
      <th>NY reaction</th>
      <th onclick="sortT('grade')">Grade ${ar('grade')}</th>
    </tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td style="font-weight:500">${r.p}</td>
      <td>${r.n}<span style="color:var(--text3);font-size:12px">&nbsp;(${r.ws} setup${r.ws!==1?'s':''})</span></td>
      <td><span style="font-size:13px;font-weight:700;color:${r.freq>=60?'var(--green)':r.freq>=40?'var(--amber)':'var(--red)'}">${r.freq}%</span></td>
      <td style="font-weight:600;font-size:13px;color:${r.avgRR>=3?'var(--green)':r.avgRR>=2?'var(--amber)':'var(--text3)'}">${r.avgRR!=null?r.avgRR+'R':'—'}</td>
      <td style="font-weight:600;font-size:13px;color:${r.avgQ>=4?'var(--green)':r.avgQ>=3?'var(--amber)':'var(--text3)'}">${r.avgQ!=null?r.avgQ+'/5':'—'}</td>
      <td>${dirTag(r.domDir)}</td>
      <td><span class="tag tb">${r.topType}</span></td>
      <td>${nyTag(r.domNY)}</td>
      <td><span class="bdg ${bc(r.grade)}">${r.grade}</span></td>
    </tr>`).join('')}
    </tbody>
  </table>
  <div class="csub" style="margin-top:10px">
    Grade A&nbsp;= freq ≥60% + avg R:R ≥3R + ≥10 obs &ensp;·&ensp;
    B&nbsp;= freq ≥45% + R:R ≥2R + ≥5 obs &ensp;·&ensp;
    C&nbsp;= some data, not yet A/B &ensp;·&ensp;
    N&nbsp;= insufficient data (&lt;3 obs)
  </div>`;
}

function sortT(c){ if(sCol===c) sDir*=-1; else{ sCol=c; sDir=-1; } buildPatternTable(filtered()); }

/* ─── Set initial theme-btn icon ─────────── */
function initThemeBtn(){
  const dark = document.documentElement.classList.contains('dark');
  document.getElementById('theme-btn').textContent = dark ? '☀️' : '🌙';
}

/* ─── Init ──────────────────────────────── */
Papa.parse(CSV,{
  download:true, header:true, skipEmptyLines:true,
  complete(res){
    if(!res.data.length){ document.getElementById('app').innerHTML='<div class="errbox">No data found in backtest_log.csv.</div>'; return; }
    ALL = res.data;
    const dates = ALL.map(r=>r['Session Date']).filter(Boolean).sort();
    document.getElementById('last-upd').innerHTML =
      `<span class="dot"></span>${ALL.length} sessions &middot; ${dates[0]||'—'} → ${dates[dates.length-1]||'—'}`;
    updateChartDefaults();
    initThemeBtn();
    render();
  },
  error(err){ document.getElementById('app').innerHTML=`<div class="errbox">Could not load backtest_log.csv: ${err.message||err}</div>`; }
});
</script>
</body>
</html>
